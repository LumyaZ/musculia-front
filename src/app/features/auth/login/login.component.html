<div class="auth-container">
  <div class="auth-card">
    <h2>Connexion</h2>
    
    <div *ngIf="errorMessage" class="error-banner">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Entrez votre email"
          [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        <div class="error-message" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          <span *ngIf="loginForm.get('email')?.errors?.['required']">L'email est requis</span>
          <span *ngIf="loginForm.get('email')?.errors?.['email']">L'email n'est pas valide</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Entrez votre mot de passe"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loginForm.invalid || loading">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
      </button>

      <div class="auth-links">
        <a routerLink="/auth/password-reset">Mot de passe oublié ?</a>
        <a routerLink="/auth/register">Créer un compte</a>
      </div>
    </form>
  </div>
</div>
